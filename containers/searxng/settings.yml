# SearXNG Configuration for OSINT Research
# This configuration enables comprehensive search across multiple engines
# for open-source intelligence gathering

general:
  # Instance identification
  instance_name: "ResearchTools SearXNG"
  debug: false
  # Privacy notice
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  # Disable safe search for comprehensive OSINT results
  safe_search: 0
  autocomplete: ""
  # Supported output formats
  formats:
    - html
    - json
  # Default language (use all languages for broader results)
  default_lang: "auto"

server:
  # Bind to all interfaces for container networking
  bind_address: "0.0.0.0"
  port: 8080
  # Disable rate limiting for internal API use
  limiter: false
  # Secret key (should be overridden in production via environment)
  secret_key: "change-this-in-production"
  # Image proxy for privacy
  image_proxy: true
  # HTTP protocol version
  http_protocol_version: "1.1"

ui:
  # Default theme
  default_theme: simple
  # Show engine stats
  query_in_title: true
  # Results per page
  results_on_new_tab: false

outgoing:
  # Request timeout settings
  request_timeout: 6.0
  # Maximum redirects
  max_redirects: 30
  # Connection pool size
  pool_connections: 100
  pool_maxsize: 20
  # Enable keepalive for better performance
  enable_http2: true
  # User agent for requests
  useragent_suffix: ""
  # Retry failed requests
  retries: 2

# Engine configuration organized by category
