stages:
  - validate
  - build
  - test

variables:
  NODE_VERSION: "22"

# Cache node_modules between jobs
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

# --- Validate Stage ---

typecheck:
  stage: validate
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci --prefer-offline
    - npx tsc -b --noEmit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

lint:
  stage: validate
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci --prefer-offline
    - npx eslint . --max-warnings 0
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# --- Build Stage ---

build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci --prefer-offline
    - npx vite build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# --- Test Stage ---

e2e:smoke:
  stage: test
  image: mcr.microsoft.com/playwright:v1.52.0-noble
  needs: ["build"]
  script:
    - npm ci --prefer-offline
    - npx playwright install --with-deps chromium
    - npx playwright test --grep @smoke --reporter=list
  artifacts:
    when: on_failure
    paths:
      - playwright-report/
      - test-results/
    expire_in: 3 days
  allow_failure: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
