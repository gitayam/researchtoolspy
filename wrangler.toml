name = "researchtoolspy"
compatibility_date = "2025-09-30"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

# Note: Cron triggers for Pages must be configured via Cloudflare Dashboard
# or using a separate Worker that calls the cleanup endpoint
# See CRON_CLEANUP_SETUP.md for instructions

# D1 Database binding (using production database for Pages deployment)
[[d1_databases]]
binding = "DB"
database_name = "researchtoolspy-prod"
database_id = "a455c866-9d7e-471f-8c28-e3816f87e7e3"

# KV Namespace binding for sessions
[[kv_namespaces]]
binding = "SESSIONS"
id = "17796fa8100b419f8df5ad08b2a09d7a"

# KV Namespace for cache
[[kv_namespaces]]
binding = "CACHE"
id = "48afc9fe53a3425b8757e9dc526c359e"

# KV Namespace for AI configuration
[[kv_namespaces]]
binding = "AI_CONFIG"
id = "7b7c607eb739402884712b0b033e3e7d"

# R2 Bucket for file uploads
[[r2_buckets]]
binding = "UPLOADS"
bucket_name = "researchtoolspy-uploads"

# Environment Variables
# Note: Secrets (OPENAI_API_KEY, VIRUSTOTAL_API_KEY) should be added via:
# wrangler secret put OPENAI_API_KEY
# wrangler secret put VIRUSTOTAL_API_KEY

[vars]
ENVIRONMENT = "development"
ENABLE_AI_FEATURES = "true"
DEFAULT_AI_MODEL = "gpt-4o-mini"
AI_GATEWAY_ACCOUNT_ID = "04eac09ae835290383903273f68c79b0"
SEARXNG_CONTAINER_URL = "http://searxng:8080"
OSINT_AGENT_URL = "http://osint-agent:8000"

[env.production.vars]
ENVIRONMENT = "production"
ENABLE_AI_FEATURES = "true"
DEFAULT_AI_MODEL = "gpt-4o-mini"
AI_GATEWAY_ACCOUNT_ID = "04eac09ae835290383903273f68c79b0"
SEARXNG_CONTAINER_URL = "http://searxng:8080"
OSINT_AGENT_URL = "http://osint-agent:8000"

[[env.production.d1_databases]]
binding = "DB"
database_name = "researchtoolspy-prod"
database_id = "a455c866-9d7e-471f-8c28-e3816f87e7e3"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "17796fa8100b419f8df5ad08b2a09d7a"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "48afc9fe53a3425b8757e9dc526c359e"

[[env.production.kv_namespaces]]
binding = "AI_CONFIG"
id = "7b7c607eb739402884712b0b033e3e7d"

[[env.production.r2_buckets]]
binding = "UPLOADS"
bucket_name = "researchtoolspy-uploads"

